name: "LeapConnect"
description: "Web dashboard for Leapmotor vehicles with MQTT Home Assistant integration"
version: "0.4.4"
slug: "leapconnect"
url: "https://github.com/markoceri/leapconnect"
arch:
  - aarch64
  - amd64
startup: "application"
boot: "auto"
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:car-electric"
panel_title: "LeapConnect"
map:
  - type: data
    read_only: false
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Web interface (not needed with ingress)"
options:
  log_level: "info"
schema:
  log_level: list(trace|debug|info|warning|error|critical)
environment:
  HISTORY_DB_PATH: /data/history.db
  DATA_DIR: /data
