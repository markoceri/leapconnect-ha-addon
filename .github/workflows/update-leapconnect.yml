name: Update LeapConnect Version

on:
  # Manual trigger with version input
  workflow_dispatch:
    inputs:
      version:
        description: "LeapConnect version (without 'v' prefix, e.g. 0.8.0)"
        required: true

  # Scheduled check every hour for new releases
  schedule:
    - cron: "0 * * * *"

jobs:
  update-addon:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine new version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Scheduled: fetch latest release from leapconnect repo
            VERSION=$(gh api repos/markoceri/leapconnect/releases/latest --jq '.tag_name' | sed 's/^v//')
          fi

          # Get current version from config.yaml
          CURRENT=$(grep '^version:' leapconnect/config.yaml | sed 's/version: *"\?\([^"]*\)"\?/\1/')

          echo "new_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"

          if [[ "${VERSION}" == "${CURRENT}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already at version ${VERSION}, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Updating from ${CURRENT} to ${VERSION}"
          fi

      - name: Fetch LeapConnect release notes
        if: steps.version.outputs.skip == 'false'
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          # Fetch release body from leapconnect repo
          NOTES=$(gh api "repos/markoceri/leapconnect/releases/tags/v${VERSION}" --jq '.body // empty')
          if [[ -z "$NOTES" ]]; then
            NOTES="Upgrade to LeapConnect v${VERSION}"
          fi
          # Save to file (multiline-safe)
          echo "$NOTES" > /tmp/release_notes.md

      - name: Update config.yaml
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          sed -i "s/^version: .*/version: \"${VERSION}\"/" leapconnect/config.yaml

      - name: Update Dockerfile
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          sed -i "s/^ARG LEAPCONNECT_VERSION=.*/ARG LEAPCONNECT_VERSION=${VERSION}/" leapconnect/Dockerfile

      - name: Update build.json
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          cd leapconnect
          jq --arg v "$VERSION" '.args.LEAPCONNECT_VERSION = $v' build.json > build.json.tmp \
            && mv build.json.tmp build.json

      - name: Update CHANGELOG.md
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          cd leapconnect
          # Prepend new entry after the "# Changelog" header
          sed -i "/^# Changelog$/a\\\\n## ${VERSION}\n\n- Upgrade to LeapConnect v${VERSION}" CHANGELOG.md

      - name: Commit, tag and push
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Upgrade to LeapConnect v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release_notes.md
